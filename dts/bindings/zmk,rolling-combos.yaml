
description: Rolling Combos - combos with support for rolling (overlapping) activation

compatible: "zmk,rolling-combos"

child-binding:
  description: "A rolling combo"

  properties:
    bindings:
      type: phandle-array
      required: true
    key-positions:
      type: array
      required: true
    timeout-ms:
      type: int
      default: 50
    require-prior-idle-ms:
      type: int
      default: -1
    slow-release:
      type: boolean
    layers:
      type: array
